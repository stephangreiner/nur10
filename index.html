<!DOCTYPE html>
<html>
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="manifest" href="./manifest.json" />
         <link rel="icon" type="image/vnd.microsoft.icon" href="media/favicon.ico">
        <link rel="stylesheet" href="style.css">
        
        <title>nur10</title>
 <script>
          if (navigator.serviceWorker) {
            window.addEventListener('load', () => {
                navigator.serviceWorker
                    .register('./sw.js')
                    .then(reg => console.log('Service Worker registriert'))
                    .catch(swErr => console.log(
                          `Service Worker Installationsfehler: ${swErr}`));
              });
          }
          
</script>  
</head>
<body>
<div id="startdiv">
    <button id="startb" onclick="start()"></button>    
    <div id ="rangediv">
       <input id='mod' type="range" min ="1" max="4" step="1" list="steplist">
       <datalist id="steplist">
          <option value="1" id="o1" label ="|"></option>
          <option value="2" id="o2" label ="|"></option>
          <option value="3" id="o3" label ="|"></option>
          <option value="4" id="o4" label ="|"></option>
    </datalist>
    </div>

  <div id="wdiv">
      <select id="ansichtw"> 
         <option value="1"> &Omicron; </option>
         <option value="2"> &#128247;</option>  
         <option value="3"> can</option>
      </select> 
      <select id="audioMode">
        <option value="none">Kein Ton</option>
        <option value="synth">Standard-Ton</option>
        <option value="file">Eigene Audio-Datei</option>
      </select>
      <div id="audioUploadControls">
        <input id="audioFileInput" type="file" accept="audio/*">
        <small id="audioInfo">Datei bleibt lokal im Browser.</small>
      </div>
  </div>
  
  
  <button id="sta_b" onclick="sta_zeigen()"><img src="./media/statistikicon.png" alt="Statistik" width="30" height="30"></button>
</div>

<div id="aktivdiv">
  <button id= "oneb"><span id="Anzahl">0</span></button>
  <button class="zurueck" onclick="neu()">x</button> 
</div>

<div id="Ldiv">
<button id= "LieB" onclick= "nasedrauf()"><span id="LieA">0</span></button>
<select id="notew">
  <option value="eins">C</option>
  <option value="zwei">D</option>
  <option value="drei">E</option>
  <option value="vier">F</option>
  <option value="fuenf">G</option>
  <option value="sechs">A</option>
  <option value="sieben">C</option>
</select>
<button class="zurueck" onclick="neu()">x</button> 
</div>




 <div id= "aktivcanvasdiv">
        <div id = "canvasdiv">
              <canvas id="canvas"></canvas>
        </div>
        <div id="orbControlDiv">
          <label for="orbControl">Steuerung:</label>
          <select id="orbControl">
            <option value="sensor">Sensor (direkt)</option>
            <option value="phase">Phase (Hocke/Stand)</option>
            <option value="speed">Speed (Abweichung × Gain)</option>
            <option value="amplitude">Amplitude (|Abw.|² + Totzone)</option>
            <option value="inertia">Inertia (Abw. → Beschleunigung)</option>
            <option value="pump">Pump (nur positiv, Ladung)</option>
          </select>
          <button id="orbBaselineBtn" type="button" title="Aktuellen g-Wert als Ruhelage speichern">Nullen</button>
          <span id="orbBaselineVal"></span>
        </div>
         <div id ="canvasuhr">
        <span id="minAn"></span>:<span id="sekAn"></span> </div>
        <div id =KniebA>
       Anzahl: <span id="KB">0</span><br>
           </div>
           <button class="zurueck" onclick="neu()">x</button>
</div>

 <div id="sta_div">
  <div class="stats-shell">
    <div class="stats-header">
      <button id="prevMonthBtn" class="nav-month-btn" onclick="navigateMonth(-1)">&#8249;</button>
      <span id="datum"></span>
      <button id="nextMonthBtn" class="nav-month-btn" onclick="navigateMonth(1)" disabled>&#8250;</button>
    </div>

    <div id="sta_div2" class="table-wrapper details-card">
      <table id="table2" class="stats-table details-table">
        <thead>
          <tr>
            <th>Tag</th>
            <th><img src="media/flach.png" alt="Kniebeugen" class="symbol_KB"></th>
            <th><img src="media/hoch.png" alt="Klimmzüge" class="symbol_KZ"></th>
            <th><img src="media/quer.png" alt="Rueckenheber" class="symbol_RH"></th>
            <th><img src="media/LiegeS.png" alt="Liegestützen" class="symbol_L"></th>
          </tr>
        </thead>
        <tbody id="statsTableBody"></tbody>
        <tfoot>
          <tr class="stats-summary-row">
            <th scope="row"><span id="monatname"></span> gesamt</th>
            <td class="cell-kb"><span id="monat"></span></td>
            <td class="cell-kz"><span id="monatKZ"></span></td>
            <td class="cell-rh"><span id="monatRH"></span></td>
            <td class="cell-l"><span id="monatL"></span></td>
          </tr>
          <tr class="stats-summary-row stats-average-row">
            <th scope="row">Ø</th>
            <td class="cell-kb"><span class="avg-pill"><span id="mittelwert"></span></span></td>
            <td class="cell-kz"><span class="avg-pill"><span id="mittelwertKZ"></span></span></td>
            <td class="cell-rh"><span class="avg-pill"><span id="mittelwertRH"></span></span></td>
            <td class="cell-l"><span class="avg-pill"><span id="mittelwertL"></span></span></td>
          </tr>
        </tfoot>
      </table>

      <div class="stats-actions stats-actions-single">
        <button class="zurueck" onclick="neu()">x</button>
      </div>
    </div>
  </div>
</div>

<script src="audiosynth.js"></script>
<script type="text/JavaScript" src="script.js"></script>
</body>
</html>
